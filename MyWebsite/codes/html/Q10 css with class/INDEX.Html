<!DOCTYPE html>
<html>
<head>
    <title>Job Application Form</title>
</head>

<body bgcolor="lightblue">

<center>
    <h2>Job Application Form</h2>
</center>

<form>

    <!-- Qualification -->
    Qualification:
    <input type="text" name="qualification"><br><br>

    <!-- Extracurricular Activities -->
    Extracurricular Activities:<br>
    <textarea rows="3" cols="30"></textarea><br><br>

    <!-- Skill Sets -->
    Skills:
    <input type="checkbox"> Programming
    <input type="checkbox"> Communication
    <input type="checkbox"> Management<br><br>

    <!-- Achievements -->
    Achievements:<br>
    <textarea rows="3" cols="30"></textarea><br><br>

    <!-- Hobbies -->
    Hobbies:
    <input type="checkbox"> Reading
    <input type="checkbox"> Sports
    <input type="checkbox"> Music<br><br>

    <!-- Job Expectation -->
    Job Expectation:<br>
    <textarea rows="3" cols="30"></textarea><br><br>

    <!-- Buttons -->
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>
