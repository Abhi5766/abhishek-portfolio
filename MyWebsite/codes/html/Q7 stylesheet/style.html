<!DOCTYPE html>
<html>
<head>
    <title>CSS Effects</title>

    <style>
        p::first-letter {
            font-size: 150%;
        }

        p::first-line {
            background-color: purple;
            color: white;
        }
    </style>

</head>

<body>

<p>
This is a sample paragraph to demonstrate CSS effects. 
The first letter is bigger and the first line has a different color.
</p>

</body>
</html>
